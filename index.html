<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İyi Ki Doğdun Elif!</title>
    <style>
        body {
            background-color: #000;
            color: #ff69b4;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #bg-canvas {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
        }

        .main-container {
            position: relative;
            z-index: 10;
            text-align: center;
            background: rgba(0, 0, 0, 0.7);
            padding: 20px;
            border: 2px solid #ff69b4;
            box-shadow: 0 0 20px #ff69b4;
            border-radius: 15px;
        }

        #countdown { font-size: 3rem; color: #fff; text-shadow: 0 0 10px #ff69b4; }

        .hidden { display: none; }

        #final-screen h1 { font-size: 2.5rem; color: #ff1493; margin-bottom: 10px; }
        #final-screen h2 { color: #ff69b4; }

        .photo-frame {
            width: 280px; height: 280px;
            border: 4px solid #ff1493;
            margin: 20px auto;
            border-radius: 50%;
            overflow: hidden;
            box-shadow: 0 0 15px #ff1493;
        }
        .photo-frame img { width: 100%; height: 100%; object-fit: cover; }

        .cake { font-size: 50px; margin: 10px; }
        .hearts { color: red; font-size: 24px; }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div class="main-container">
        <div id="countdown-screen">
            <h2 style="color: #ff69b4;">BÜYÜK SÜRPRİZE SON...</h2>
            <div id="countdown">Yükleniyor...</div>
        </div>

        <div id="final-screen" class="hidden">
            <div class="hearts">❤️❤️❤️❤️❤️❤️❤️</div>
            <h1>SENİ SEVİYORUM ELİF</h1>
            <div class="photo-frame">
                <img src="elif.jpg" alt="Elif">
            </div>
            <div class="cake">🎂✨🎁</div>
            <h2>İyi Ki Doğdun!</h2>
            <div class="hearts">❤️❤️❤️❤️❤️❤️❤️</div>
        </div>
    </div>

    <script>
        // 1. PEMBE HACKER YAĞMURU
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const letters = "ELIF❤️❤️01010101";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);

        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#ff69b4"; // PEMBE RENK
            ctx.font = fontSize + "px arial";
            for (let i = 0; i < drops.length; i++) {
                const text = letters.charAt(Math.floor(Math.random() * letters.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 35);

        // 2. GERİ SAYIM VE GEÇİŞ (Tarihi bugünden sonraya kurdum ki geri sayımı gör)
        const targetDate = new Date().getTime() + 10000; // ŞİMDİLİK 10 SANİYE SONRAYA AYARLI

        const timer = setInterval(function() {
            const now = new Date().getTime();
            const diff = targetDate - now;

            const saniye = Math.floor((diff % (1000 * 60)) / 1000);
            document.getElementById("countdown").innerHTML = saniye + "sn";

            if (diff < 0) {
                clearInterval(timer);
                document.getElementById("countdown-screen").classList.add("hidden");
                document.getElementById("final-screen").classList.remove("hidden");
                startFireworks(); // Havai fişek başlasın
            }
        }, 1000);

        // 3. BASİT HAVAİ FİŞEK EFEKTİ (Kalp şeklinde patlamalar için simülasyon)
        function startFireworks() {
            // Arka planı tamamen kalplerle dolduracak basit bir efekt
            setInterval(() => {
                ctx.fillStyle = "#ff1493";
                ctx.beginPath();
                ctx.arc(Math.random()*canvas.width, Math.random()*canvas.height, 2, 0, Math.PI*2);
                ctx.fill();
            }, 50);
        }
    </script>
</body>
</html>
