<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Elif için Sürpriz ❤️</title>
    <style>
        /* 1. TÜM SAYFAYI ÇİVİLE */
        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            touch-action: none;
        }

        body, html { 
            width: 100%; height: 100%; background: #000; 
            overflow: hidden !important;
            position: fixed;
            top: 0; left: 0;
            font-family: 'Arial', sans-serif; 
            color: white;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }

        #matrix-canvas {
            position: fixed; top: 0; left: 0; z-index: 1;
            width: 100% !important; height: 100% !important;
        }

        #intro-overlay {
            position: fixed; inset: 0; z-index: 10;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: black;
            width: 100%; height: 100%;
        }

        #num-box { font-size: 100px; color: #ff80ab; font-weight: bold; text-shadow: 0 0 20px #ff80ab; }
        
        .message-group { display: none; flex-direction: column; align-items: center; }
        .pink-text { font-size: 2.5rem; color: #ff80ab; text-shadow: 0 0 20px #ff80ab; text-align: center; padding: 0 10px; }
        .giant-heart { font-size: 120px; color: #ff80ab; margin-top: 10px; filter: drop-shadow(0 0 25px #ff80ab); }

        #final-page {
            position: fixed; inset: 0; z-index: 20;
            display: none; flex-direction: column; justify-content: center; align-items: center;
            background: rgba(0, 0, 0, 0.5); 
            text-align: center;
            padding: 20px;
            width: 100%; height: 100%;
        }

        .circle-frame {
            width: 220px; height: 220px; border-radius: 50%;
            border: 4px solid #fff; overflow: hidden;
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.5);
            display: flex; justify-content: center; align-items: center;
            margin-bottom: 15px;
            flex-shrink: 0;
        }

        /* BURASI FOTOĞRAFI GÖSTEREN YER */
        .circle-frame img {
            width: 100%; height: 100%; object-fit: cover;
        }

        .red-heart-under { font-size: 50px; margin-bottom: 10px; animation: pulse 1.5s infinite; }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .final-title { color: white; font-size: 1.8rem; margin-bottom: 8px; text-shadow: 0 0 10px black; }
        .final-sub { color: #ff4d4d; font-size: 1.5rem; font-weight: bold; text-shadow: 0 0 15px #ff4d4d; }

        .rain-heart {
            position: absolute; color: #ff4d4d; pointer-events: none;
            z-index: 15; animation: fall linear forwards;
        }
        @keyframes fall {
            0% { transform: translateY(110vh) scale(0.5); opacity: 0; }
            10% { opacity: 1; }
            100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
        }

        @media (max-width: 600px) {
            .circle-frame { width: 180px; height: 180px; }
            .pink-text { font-size: 2rem; }
        }
    </style>
</head>
<body scroll="no"> 
    <canvas id="matrix-canvas"></canvas>

    <div id="intro-overlay">
        <div id="num-box">3</div>
        <div class="message-group" id="msg-group">
            <h2 class="pink-text">Seni Seviyorum Elif</h2>
            <div class="giant-heart">❤️</div>
        </div>
    </div>

    <div id="final-page">
        <div class="circle-frame">
            <img src="elif.jpg" alt="Elif">
        </div>
        <div class="red-heart-under">❤️</div>
        <h1 class="final-title">İyi ki doğdun Elif! 🥳</h1>
        <p class="final-sub">Seni Seviyorum</p>
    </div>

    <script>
        document.addEventListener('touchmove', function(e) { e.preventDefault(); }, { passive: false });
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        const chars = "ELIF❤️01010101";
        const fontSize = 16;
        let columns = canvas.width / fontSize;
        let drops = Array(Math.floor(columns)).fill(1);

        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.15)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#ff80ab"; 
            ctx.font = "bold " + fontSize + "px monospace";
            for (let i = 0; i < drops.length; i++) {
                const text = chars[Math.floor(Math.random() * chars.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.98) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 50);

        let count = 3;
        const countBox = document.getElementById('num-box');
        const intro = document.getElementById('intro-overlay');
        const msgGroup = document.getElementById('msg-group');
        const finalPage = document.getElementById('final-page');

        const cd = setInterval(() => {
            count--;
            if(count > 0) {
                countBox.textContent = count;
            } else {
                clearInterval(cd);
                countBox.style.display = 'none';
                msgGroup.style.display = 'flex';
                setTimeout(() => {
                    intro.style.display = 'none';
                    finalPage.style.display = 'flex';
                    setInterval(makeHeart, 200); 
                }, 2500);
            }
        }, 1000);

        function makeHeart() {
            const h = document.createElement('div');
            h.className = 'rain-heart';
            h.innerHTML = '❤️';
            h.style.left = Math.random() * 100 + 'vw';
            h.style.fontSize = (Math.random() * 15 + 20) + 'px';
            h.style.animationDuration = (Math.random() * 2 + 2) + 's';
            document.body.appendChild(h);
            setTimeout(() => h.remove(), 4000);
        }
    </script>
</body>
</html>
